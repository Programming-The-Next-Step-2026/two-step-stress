name: tests

# Run the suite on every push (any branch) and on every PR targeting main.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # matches the local conda env

      # ----------------------------------------------------------------------
      # Why we don't use `pip install -e ".[dev]"` here:
      #
      # psychopy is a runtime dependency in pyproject.toml (the live task uses
      # it for stimulus presentation), but it drags in heavy system libraries
      # — GTK, SDL2, PortAudio, wxPython — that are slow and frequently fail to
      # install on minimal Ubuntu CI runners (wxPython in particular often has
      # no wheel and must compile from source, which can take 20+ minutes or
      # break the build outright).
      #
      # None of the unit tests import psychopy: they exercise only the
      # pure-logic modules (config, transitions, rewards, nback), whose sole
      # third-party dependency is numpy. So we install the package WITHOUT its
      # dependencies (`--no-deps`) and then add the analysis/runtime deps
      # explicitly — i.e. pyproject's main deps minus psychopy, plus pytest
      # from the [dev] extra. If the task ever needs psychopy validated in CI,
      # switch to installing the SDL2/GTK/PortAudio system libs first.
      # ----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          pip install numpy pandas scipy statsmodels matplotlib pytest

      - name: Run tests
        run: pytest -v
