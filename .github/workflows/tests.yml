name: tests

# Run the suite on every push (any branch) and on every PR targeting main.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # the package pins requires-python = ">=3.11,<3.12"

      # The [dev] extra is PsychoPy-free (PsychoPy lives in the separate [task]
      # extra), so this installs cleanly on a minimal Ubuntu runner.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v
